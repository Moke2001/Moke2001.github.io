deck: 这项研究提出一种直接面向费米子量子计算的 LDPC 纠错方案，尝试减少费米子系统映射到量子比特时带来的额外开销，并通过模拟展示错误抑制效果。
overview: '## 研究概览


  很多量子模拟任务本来研究的是费米子系统，例如电子在材料中的运动。但现有量子计算机通常以量子比特为基本单元，研究者需要先把费米子问题转换成量子比特问题，这一步会引入额外资源消耗。本文关注的是另一条路线：能否让容错量子计算更直接地在费米子编码上工作。


  ## 核心思路


  论文提出了费米子到费米子的低密度奇偶校验码方案。直观地说，它把费米子 LDPC 码作为信息存储结构，再把状态转移到费米子 color code 处理器上执行逻辑操作。作者还给出寻找奇权重逻辑
  Majorana 算符的算法，并讨论用费米子 lattice surgery 完成状态转移的方法。数值例子显示，相关编码率可以接近量子比特码，同时逻辑失败率能明显低于物理错误率。


  ## 术语介绍


  - 费米子：电子等物质粒子所属的一类量子对象，许多材料和化学体系的模拟都需要处理费米子规律。


  - LDPC 码：低密度奇偶校验码，特点是每个校验只关联少量变量，适合构造可扩展的纠错结构。


  - Majorana 算符：描述费米子自由度的一种数学对象，在费米子编码和拓扑量子信息中经常出现。


  - Lattice surgery：通过切分、合并编码区域来转移或组合量子信息的一类容错操作思想。


  ## 后续展望


  这类方案把纠错码设计、费米子物理系统模拟和容错操作放到同一个框架里考虑。后续可以继续比较不同费米子编码在真实噪声模型下的表现，优化状态转移过程，并探索它们与具体量子硬件架构之间的匹配方式。'
figures:
- file: figures/01-fig1.png
  name: fig1
  caption: 展示本文的整体方案：费米子 LDPC 记忆区通过 lattice surgery 将状态转移到 color code 处理器中，再执行逻辑操作。
  source_caption: 'Schematic illustration of fault-tolerant fermionic quantum computation
    framework. The architecture comprises three components: fermionic memory implemented
    using fermionic LDPC codes, fermionic processor implemented using fermionic color
    codes to execute logical operations, and fermionic interface composed of ancilla
    fermions serving as a critical bridge for communication between memory and processor.'
  source_file: fig1.pdf
  order: 1
- file: figures/02-memorysimulation.png
  name: MemorySimulation
  caption: 展示费米子 LDPC 记忆区的模拟设置，用来评估编码在噪声下保存量子信息的能力。
  source_caption: (a) Illustration of the circuit-level noise model where the syndrome
    extraction transfer circuits used to establish entanglement between data fermions
    and ancilla qubits are noisy. The initial states are physical |0 states for fermions.
    In the end, a transversal measurement on all physical fermion modes in the particle
    number basis is performed. Logical failure rate p_L versus physical error rate
    p under (b) phenomenological and (c) circuit-level noise model for fermionic [[20,4,4]]_{f},
    [[36,4,6]]_{f} and [[44,4,7]]_{f} double-chain bicycle codes. We also perform
    a power law fit to the data according to the fitting formula p_L p^ with =2.21,
    3.06, 4.3 in (b) and =2.12, 3.46, 4.54 in (c), and the gray lines represent the
    probability that at least an error occurs on four physical fermion modes. Here,
    the Tesseract decoder beni2025tesseractdecoder is employed, and the results obtained
    using the belief propagation and ordered-statistical decoding (BP+OSD) liang2025low,roffe_decoding_2020
    algorithm are presented in Supplemental Material.
  source_file: MemorySimulation.pdf
  order: 2
- file: figures/03-latticesurgery.png
  name: LatticeSurgery
  caption: 展示 lattice surgery 状态转移流程，说明不同编码区域如何通过合并和切分完成信息传递。
  source_caption: '(a) Quantum circuit to transfer a logical fermionic state _A to
    code block B (initialized as 0_B). The protocol involves: (i) measuring _A_B and
    applying the Z gate of (_B), provided the measurement result is -1; (ii) measuring
    the logical particle number n_A and applying {two braiding gates and one fermionic
    Z gate}, if the measurement outcome is 1; (iii) applying a phase rotation S gate
    to the state in the processor. The validation of this circuit is provided in Supplemental
    Material. (b) Illustration of the first method for lattice surgery achieving fault-tolerant
    measurements of _A _B in the case with |_A|=|_B|. In this example, code B is a
    d=5 fermionic color code, and code A is a fermionic LDPC code containing five
    Majorana operators in the support of _A. The empty circles represent the -type
    Majorana operators in blocks A and B. Several pairs of ancilla Majorana operators
    are introduced with each horizontal pair represented by yellow and gray circles
    to denote -type and ^-type Majorana operator forming a complex fermion. The -type
    stabilizer generators at the boundary, connected to ancilla fermions, are modified
    to incorporate the ancilla Majorana operators (green rhombuses). Measurement and
    gauge stabilizer generators are depicted as blue squares and red triangles, respectively.
    The product of these stabilizer generators yields the joint logical operator _A
    _B. The ^-ty'
  source_file: LatticeSurgery.pdf
  order: 3
- file: figures/04-tasksimulation.png
  name: TaskSimulation
  caption: 展示任务级模拟流程，把纠错码构造、噪声抽样和逻辑失败率估计串联起来。
  source_caption: (a) Quantum circuit used to benchmark our protocol. We first initialize
    the system in the logical state |0101 and then apply three tunneling gates with
    each gate executing the operation {T}_{j,j+1}= ( (c_j^ c_{j+1} + H.c.)/2). Onsite
    measurements of n_j=c_j^ c_j with j=0,1,2 are then performed, followed by a fermionic
    swap (fSWAP) gate if the measurement result is zero. The unitary gates and feedback
    process constitute a module, which is executed consecutively multiple times. (b)
    The expectation value of logical particle numbers at site 1 and 4 with respect
    to time which is characterized by the number of executed modules. We see that
    the simulation under circuit-level noise with error correction (filled blue circles
    and squares) is close to the noiseless simulation result (the dotted-dashed lines),
    in stark contrast to the simulation results under noise without error correction
    (filled red circles and squares). In the simulation, we apply the first method
    for lattice surgery. Results using the second method are provided in the Supplemental
    Material. Here, we set the physical error rate p=10^{-4}. The error bars are hidden
    behind the symbols.
  source_file: TaskSimulation.pdf
  order: 4
- file: figures/05-figs-stabilizers.png
  name: figs-stabilizers
  caption: 展示相关稳定子或校验结构，帮助说明编码如何约束允许的量子态。
  source_caption: Illustration of modified stabilizers in (a), measurement stabilizers
    in (b), and gauges stabilizers in (c) for a specific case of fermionic lattice
    surgery using method 1. Before merging, the original stabilizers include those
    of the fermionic LDPC code, the color code, and the stabilizers of ancilla Majorana
    operators (each stabilizer includes a pair of ancilla Majorana operators forming
    a complex fermion).
  source_file: figs-stabilizers.pdf
  order: 5
- file: figures/06-figs-general-ls.png
  name: figs-general-LS
  caption: 展示更一般的 lattice surgery 构型，说明状态转移方法如何扩展到不同几何布局。
  source_caption: Illustration of how to add ancilla Majorana modes and stabilizers
    for a merged code using method 2. Here we consider two logical operators in codes
    A and B, supported by five and three Majorana operators, respectively. Initially,
    we have two logical operators described by the original stabilizer generators
    represented by green rhombuses and Majorana operators represented by circles for
    code A in the support of _A and for code B in the support of _B (see (a)). Pairs
    of ancilla Majorana operators (yellow and gray circles) are added following the
    rules detailed in the text, and the modified stabilizer generators are introduced
    (see (b)). We then incorporate measurement stabilizer generators with an additional
    pair of ancilla Majorana operators to make their weights even (see (c)). In (d),
    we label all ancilla modes and construct a graph with vertices corresponding to
    stabilizers and ancilla Majorana modes, and edges defined between them accordingly,
    which corresponds to Fig. S3(a) in Supplemental Material. The gauge stabilizer
    generators are also presented in Fig. S3(c) in Supplemental Material.
  source_file: figs-general-LS.pdf
  order: 6
- file: figures/07-figs1.png
  name: figs1
  caption: 展示论文中的第 7 张图，用来辅助说明相关构造、流程或模拟结果。
  source_caption: (a) The Tanner graph description of the Steane code. The circles,
    blue and green squares represent the fermions, the -type stabilizers, and the
    '-type stabilizers, respectively. (b) Illustration of a circulant matrix used
    to construct bicycle codes. (c) Illustration of the Euclidean geometry when (m,q)=(2,3).
    In this special case, the lines are the straight lines on a torus with different
    directions. (d) The Fano plane, which is the simplest example of a finite projective
    plane. We will use many planes like this in code construction from finite projective
    geometry.
  source_file: figs1.pdf
  order: 7
